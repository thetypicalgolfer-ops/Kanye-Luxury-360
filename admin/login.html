<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Kanye Concierge 360 Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary); }
.login-wrap { width:100%; max-width:420px; padding:2rem; }
.login-box {
    background:var(--bg-card);
    border:1px solid var(--border);
    padding:3.5rem 3rem;
}
.login-logo {
    text-align:center;
    margin-bottom:2.5rem;
}
.login-logo-text {
    font-family:var(--serif);
    font-size:1.6rem;
    font-weight:300;
    color:var(--text-primary);
    letter-spacing:0.02em;
}
.login-logo-text span { color:var(--bronze); }
.login-logo-tag {
    font-size:0.58rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--text-secondary);
    margin-top:0.5rem;
}
.login-divider {
    width:40px;
    height:1px;
    background:var(--bronze);
    margin:1.75rem auto;
    opacity:0.5;
}
.login-error {
    background:rgba(224,92,92,0.1);
    border:1px solid rgba(224,92,92,0.25);
    color:#e05c5c;
    padding:0.75rem 1rem;
    font-size:0.82rem;
    margin-bottom:1.25rem;
    display:none;
}
.login-hint {
    text-align:center;
    margin-top:1.75rem;
    font-size:0.78rem;
    color:var(--text-secondary);
}
.login-hint a { color:var(--bronze); }
.login-form .btn { width:100%; justify-content:center; padding:0.9rem; font-size:0.75rem; }
.login-form .form-group { margin-bottom:1.25rem; }
</style>
</head>
<body data-page="login">
<div class="login-wrap">
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-text">Kanye Concierge <span>360°</span></div>
            <div class="login-logo-tag">Agent Portal</div>
        </div>
        <div class="login-divider"></div>
        <div class="login-error" id="login-error"></div>
        <form id="login-form" class="login-form">
            <div class="form-group">
                <label class="form-label" for="login-email">Email Address</label>
                <input type="email" id="login-email" class="form-control" placeholder="agent@kanyeconcierge360.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="login-pass">Password</label>
                <input type="password" id="login-pass" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign In to Dashboard</button>
        </form>
        <div class="login-hint">
            <p style="margin-top:1rem;font-size:0.72rem;color:var(--text-dim);">Use any email + password (4+ chars) to demo.</p>
            <p style="margin-top:0.5rem;"><a href="../index.html">← Back to Website</a></p>
        </div>
    </div>
</div>
<script src="admin.js"></script>
</body>
</html>
